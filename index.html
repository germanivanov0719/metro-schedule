<!DOCTYPE html>
<html lang="ru" data-theme="system">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff" id="themeColor">
  <meta name="description" content="Время работы вестибюлей, первые и последние поезда Петербургского метрополитена. Работает офлайн.">
  <title>Петербургский метрополитен · режим станций</title>

  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Метро СПб">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=PT+Sans:ital,wght@0,400;0,700;1,400&family=PT+Serif:wght@400;700&family=Roboto:wght@700&display=swap">
  <!-- Иконки транспорта (Material Symbols), подгружается только нужный набор -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=directions_bus,train&display=block">

  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Переиспользуемые векторные символы -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <!-- Официальный логотип Петербургского метрополитена (viewBox выровнен по контуру) -->
    <symbol id="metroM" viewBox="0 -460000 20000400 16000000">
      <path fill="currentColor" d="m6026765 2907127c-299804-1015676-1113594-904356-1.67e6 -431300-1370626 1266075-3155291 3923495-2013094 7.75e6 956578 3241739 4936901 5314839 4936901 5314839h-4.64e6s-2395828-2685264-2.61e6 -5843500c-271260-3993020 1327930-6511332 3183988-8153020 1741824-1544365 3398006-2003480 3398006-2003480l3387831 1.11e7 3387831-1.11e7s1656182 459116 3398006 2003480c1856058 1641687 3455248 4.16e6 3183988 8153020-214173 3158236-2.61e6 5843500-2.61e6 5843500h-4.64e6s3.98e6 -2073100 4936900-5314839c1142197-3826069-642468-6483489-2013094-7.75e6 -556826-473056-1370617-584376-1.67e6 431300-1027971 3241740-3973210 1.253e7 -3973210 1.253e7s-2945239-9291363-3973210-1.253e7z"/>
    </symbol>
    <!-- Стрелки направлений: рисуем вектором, чтобы не зависеть от шрифта -->
    <symbol id="icoArrowR" viewBox="0 0 24 24">
      <path d="M3 12h15M12 6l7 6-7 6" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>
    <symbol id="icoArrowLR" viewBox="0 0 24 24">
      <path d="M8 6l-5.5 6 5.5 6M16 6l5.5 6-5.5 6M3 12h18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>
    <!-- Иконка круглосуточной работы (часы) -->
    <symbol id="icoClock" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2"/>
      <path d="M12 7v5l3.5 2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>
  </svg>

  <header class="topbar" id="topbar">
    <!-- Строка 1: логотип + название, по центру -->
    <div class="tb-brand">
      <svg class="tb-logo" viewBox="0 -460000 20000400 16000000"><use href="#metroM"/></svg>
      <span class="tb-brandname">Петербургский метрополитен</span>
    </div>
    <!-- Строка 2: режим работы и чётность дня -->
    <div class="tb-row">
      <span class="tb-mode">Режим работы станций</span>
      <span class="tb-parity" id="clockParity"></span>
    </div>
    <!-- Строка 3: время обновления данных и текущее время -->
    <div class="tb-row tb-row--minor">
      <span class="tb-upd" id="updStatus"></span>
      <span class="tb-clock" id="clockTime">--:--</span>
    </div>

    <div class="search">
      <input id="search" type="search" inputmode="search" autocomplete="off"
             placeholder="Станция или вестибюль" aria-label="Поиск станции">
      <button class="search__clear" id="searchClear" aria-label="Очистить" hidden>×</button>
    </div>

    <nav class="lines" id="lineFilter" aria-label="Линии"></nav>
  </header>

  <main id="list" class="list" aria-live="polite" aria-busy="true">
    <div class="loader" id="loader">
      <span class="loader__spin" aria-hidden="true"></span>
      <span class="loader__text">Загрузка расписания…</span>
    </div>
  </main>

  <!-- Свёрнутые объявления (пересадки, праздники) -->
  <section class="minis" id="minis" aria-label="Объявления"></section>

  <footer class="foot" id="foot"></footer>

  <div class="theme" role="group" aria-label="Тема оформления">
    <button class="theme__btn" data-theme-set="system">Система</button>
    <button class="theme__btn" data-theme-set="light">Светлая</button>
    <button class="theme__btn" data-theme-set="dark">Тёмная</button>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite" hidden></div>

  <script type="module" src="app.js"></script>
</body>
</html>
